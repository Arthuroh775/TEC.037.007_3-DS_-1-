<!DOCTYPE html>

<html lang="PT-BR">



<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Jogo</title>


    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

</head>



<body>

    <div class="container">
        <div class="card text-center">
            <div class="card-header">RPG: Criado por Arthur Martins</div>
            <div class="card-body" id ="tela" style="background-image:url('assets/Cenario_3.gif');  background-size: cover;   
  background-repeat: no-repeat; 
;">
            <p class="card-text">Turno 1</p>
            <div class="row">

                <div class="col text-end" id="col-heroi">
                    <ul class="list-group float-center" style="width: 225px">
                        <li id="nome-heroi" class="list-group-item group-item-info list-group-item-success">Naruto</li>
                        <li id="titulo-heroi" class="list-group-item">🐅</li>
                        <li id="hp-heroi" class="list-group-item ">HP <progress id="hp-heroi" value="800" max="800"
                                style="accent-color: rgb(9, 214, 88);"></progress></li>
                        <li id="mp-heroi" class="list-group-item"> Chakra <progress id="mp-heroi" value="300" max="300"
                                style="accent-color: rgb(53, 53, 97);"></progress> </li>
                        <li id="en-heroi" class="list-group-item">Besta Enjaulada <progress id="energia-heroi"
                                value="800" max="800" style="accent-color: rgb(255, 242, 0);"></progress>
                        </li>
                    </ul>



                </div>
                <div class="col text-end" id="col-botoes">

                    <img src="assets/dessa vez vai.gif" width="230" height="380"></img>

                </div>
                
                <div class="col text-start" id="col-msg">

                    <img src="assets/Sasuke.viado.gif" width="300" height="300" class="card-img-bottom"></img>

                </div>
                
                <div class="col text-end" id="col-boss">
                    <ul class="list-group float-end" style="width: 225px;">
                        <li id="nome-heroi" class="list-group-item list-group-item-danger">Sasuke Uchiha</li>
                        <li id="titulo-heroi" class="list-group-item">👁️‍🗨️</li>
                        <li id="hp-heroi" class="list-group-item">HP <progress id="hp-heroi" value="800" max="800"
                                style="accent-color: rgb(14, 233, 43); "></progress></li>
                        <li id="mp-heroi" class="list-group-item"> Chakra <progress id="mp-boss" value="300" max="300"
                                style="accent-color: rgb(14, 13, 13);"></progress></li>
                        <li id="en-heroi" class="list-group-item">Sharingan <progress id="energia-heroi" value="800"
                                max="800" style="accent-color: rgb(231, 18, 18);"></progress></li>
                    </ul>

                    

                </div>
                <div class="btn-group" id="controles">
                    <button class="btn btn-dark">ATTACK</button>
                    <button class="btn btn-dark">Skill</button>
                    <button class="btn btn-dark">Ultimate</button>
                </div>
            </div>

            <div class="row">

                

                
            </div>
                <div class="card-footer"></div>
            </div><!-- card-->
        </div><!--container-->

    </div>

</body>



</html>
